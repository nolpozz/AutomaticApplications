- title: Social Media Marketing Intern, Northwind Outfitters (Summer 2025)
  text: >
    Ran the Instagram and TikTok accounts for a regional outdoor-apparel brand.
    Grew the combined following from 8k to 14k in ten weeks and lifted average
    post engagement by 32% by shifting to short-form video and a consistent
    posting calendar.
  tags: [social media, instagram, tiktok, content, analytics]
- title: Planned and ran a back-to-school giveaway campaign
  text: >
    Designed a two-week giveaway with a partner brand that added ~2,300 email
    subscribers and drove a 19% increase in website sessions, tracked in Google
    Analytics.
  tags: [campaigns, email marketing, google analytics]
- title: Built the weekly performance report
  text: >
    Created a simple GA4 + spreadsheet dashboard the marketing team used every
    Monday to decide what content to double down on.
  tags: [google analytics, excel, reporting]
