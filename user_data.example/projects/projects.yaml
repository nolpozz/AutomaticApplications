- title: Integrated marketing campaign for a local coffee shop (capstone)
  text: >
    Led a 4-person team building a full campaign for a local cafe: positioning,
    a content calendar, a loyalty-program concept, and paid social mockups.
    Presented to the owner, who adopted the loyalty idea.
  tags: [campaigns, brand, content, social media]
- title: TikTok growth experiment for a student org
  text: >
    Ran a month-long A/B test on posting times and hook styles for a campus
    club, growing the account from 300 to 1,900 followers and documenting what
    drove the lift.
  tags: [tiktok, social media, a/b testing, analytics]
- title: Consumer-behavior research survey
  text: >
    Designed and fielded a Qualtrics survey of 180 students on subscription
    fatigue, then analyzed and presented the findings in a class research report.
  tags: [market research, qualtrics, consumer behavior, survey]
- title: SEO content refresh for a nonprofit
  text: >
    Rewrote five landing pages and added blog content for a local nonprofit,
    improving organic search impressions by 40% over two months.
  tags: [seo, content marketing, copywriting]
